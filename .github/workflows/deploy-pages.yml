# Déploiement de la démo sur GitHub Pages (à chaque push sur main).
# Activer dans le dépôt : Settings > Pages > Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Un seul job concurrent pour les déploiements
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        run: pnpm build
        env:
          # Base path pour que les assets et le router fonctionnent sur https://user.github.io/repo/
          VITE_BASE_PATH: /banktestapp/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/starter/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
